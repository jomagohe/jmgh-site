---
layout: default
title: Versos
---
<style>
  .page-wrap { max-width: 720px; margin: 0 auto; padding: 4rem 2rem 6rem; text-align: center; }
  .page-eyebrow { font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
  .page-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 300; font-style: italic; margin-bottom: 1rem; }
  .page-divider { width: 50px; height: 1px; background: var(--gold); margin: 0 auto 4rem; }
  .versos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); text-align: left; }
  .verso-card { background: var(--cream); padding: 2rem; text-decoration: none; color: inherit; transition: background 0.2s; display: block; }
  .verso-card:hover { background: var(--cream-dark); }
  .verso-fecha { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
  .verso-titulo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; font-weight: 300; line-height: 1.4; }
  @media (max-width: 600px) { .versos-grid { grid-template-columns: 1fr; } }
</style>
<div class="page-wrap">
  <p class="page-eyebrow">Poesía</p>
  <h1 class="page-title">Versos</h1>
  <div class="page-divider"></div>
  <div class="versos-grid">
    {% for verso in site.versos %}
    <a href="{{ verso.url }}" class="verso-card">
      <p class="verso-fecha">{{ verso.date | date: "%d %b %Y" }}</p>
      <p class="verso-titulo">{{ verso.title }}</p>
    </a>
    {% endfor %}
  </div>
</div>
