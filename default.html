<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} — {% endif %}José Manuel Gómez Hernández</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1612; --ink-light: #4a4540; --ink-muted: #8a8480;
    --cream: #f7f4ef; --cream-dark: #ede9e2;
    --gold: #b8955a; --border: rgba(26,22,18,0.12);
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); font-size: 16px; line-height: 1.7; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 3rem;
    background: rgba(247,244,239,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 400; letter-spacing: 0.08em; color: var(--ink); text-decoration: none; }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-light); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: var(--gold); }

  main { padding-top: 80px; }

  .btn-primary { display: inline-block; padding: 0.85rem 2rem; background: var(--ink); color: var(--cream); text-decoration: none; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; transition: background 0.25s; }
  .btn-primary:hover { background: var(--gold); }
  .btn-ghost { display: inline-block; padding: 0.85rem 2rem; border: 1px solid var(--border); color: var(--ink-light); text-decoration: none; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; transition: all 0.25s; }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

  footer { padding: 3rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .footer-copy { font-size: 0.75rem; color: var(--ink-muted); }
  .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 0.9rem; letter-spacing: 0.1em; color: var(--ink-muted); }

  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { display: none; }
    footer { flex-direction: column; gap: 1rem; text-align: center; }
  }
</style>
{% seo %}
</head>
<body>
<nav>
  <a href="/" class="nav-logo">JMGH</a>
  <ul class="nav-links">
    <li><a href="/#sobre-mi">Sobre mí</a></li>
    <li><a href="/#libros">Libros</a></li>
    <li><a href="/#premios">Premios</a></li>
    <li><a href="/articulos/">Artículos</a></li>
    <li><a href="/versos/">Versos</a></li>
    <li><a href="/#contacto">Contacto</a></li>
  </ul>
</nav>
<main>
  {{ content }}
</main>
<footer>
  <p class="footer-copy">© {{ 'now' | date: "%Y" }} José Manuel Gómez Hernández. Todos los derechos reservados.</p>
  <p class="footer-logo">JMGH</p>
</footer>
</body>
</html>
