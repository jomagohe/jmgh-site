---
layout: default
title: Artículos
---
<style>
  .page-wrap { max-width: 860px; margin: 0 auto; padding: 4rem 2rem 6rem; }
  .page-header { margin-bottom: 4rem; }
  .page-eyebrow { font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
  .page-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 300; }
  .articles-feed { display: flex; flex-direction: column; }
  .article-item { display: grid; grid-template-columns: 1fr auto; gap: 2rem; align-items: start; padding: 2rem 0; border-bottom: 1px solid var(--border); text-decoration: none; color: inherit; transition: opacity 0.2s; }
  .article-item:first-child { border-top: 1px solid var(--border); }
  .article-item:hover { opacity: 0.7; }
  .article-tag { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
  .article-title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; line-height: 1.4; }
  .article-date { font-size: 0.75rem; color: var(--ink-muted); white-space: nowrap; margin-top: 0.3rem; }
</style>
<div class="page-wrap">
  <div class="page-header">
    <p class="page-eyebrow">Escritura periodística</p>
    <h1 class="page-title">Artículos</h1>
  </div>
  <div class="articles-feed">
    {% for post in site.posts %}
    <a href="{{ post.url }}" class="article-item">
      <div>
        <p class="article-tag">{{ post.category }}</p>
        <p class="article-title">{{ post.title }}</p>
      </div>
      <p class="article-date">{{ post.date | date: "%d %b %Y" }}</p>
    </a>
    {% endfor %}
  </div>
</div>
