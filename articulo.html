---
layout: default
---
<style>
  .articulo-wrap { max-width: 720px; margin: 0 auto; padding: 4rem 2rem 6rem; }
  .articulo-meta { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
  .articulo-titulo { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 300; line-height: 1.2; margin-bottom: 1.5rem; }
  .articulo-divider { width: 50px; height: 1px; background: var(--gold); margin-bottom: 2.5rem; }
  .articulo-cuerpo { font-size: 1.05rem; line-height: 1.85; color: var(--ink-light); }
  .articulo-cuerpo p { margin-bottom: 1.5rem; }
  .articulo-cuerpo h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 400; color: var(--ink); margin: 2.5rem 0 1rem; }
  .articulo-cuerpo blockquote { border-left: 2px solid var(--gold); padding-left: 1.5rem; font-style: italic; color: var(--ink-muted); margin: 2rem 0; }
  .back-link { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-muted); text-decoration: none; margin-bottom: 3rem; transition: color 0.2s; }
  .back-link:hover { color: var(--gold); }
</style>
<div class="articulo-wrap">
  <a href="/articulos/" class="back-link">← Todos los artículos</a>
  <p class="articulo-meta">{{ page.category }} · {{ page.date | date: "%d %b %Y" }}</p>
  <h1 class="articulo-titulo">{{ page.title }}</h1>
  <div class="articulo-divider"></div>
  <div class="articulo-cuerpo">
    {{ content }}
  </div>
</div>
